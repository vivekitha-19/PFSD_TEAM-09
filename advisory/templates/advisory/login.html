<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmAI – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /*
    ═══════════════════════════════════════════════════
      HOW TO CHANGE BACKGROUND COLORS — EASY GUIDE
    ═══════════════════════════════════════════════════
    All colors are controlled by CSS variables at the TOP.
    Just change those and everything updates automatically.

    KEY VARIABLES TO CHANGE:
      --bg-from     : top gradient color (currently soft mint)
      --bg-to       : bottom gradient color (currently pale sage)
      --card-bg     : the login card background
      --accent      : button/highlight color (currently forest green)
      --text-dark   : main heading text color
      --text-mid    : sub-heading / label color
      --border-col  : input border and card border color

    EXAMPLES:
      Lavender theme: --bg-from: #f3f0ff; --bg-to: #e9e4ff; --accent: #7c3aed
      Ocean theme:    --bg-from: #f0f9ff; --bg-to: #e0f2fe; --accent: #0369a1
      Rose theme:     --bg-from: #fff1f2; --bg-to: #fce7f3; --accent: #be123c
    ═══════════════════════════════════════════════════
    */
    :root {
      --bg-from:    #f0faf4;      /* ← CHANGE THIS for top background color */
      --bg-to:      #e8f5ee;      /* ← CHANGE THIS for bottom background color */
      --bg-mid:     #edf7f1;      /* middle gradient stop */
      --card-bg:    rgba(255,255,255,0.92);  /* ← card background */
      --card-border: rgba(134,195,156,0.35); /* ← card border */
      --accent:     #2d6a4f;      /* ← button / highlight color */
      --accent-lt:  #52b788;      /* ← lighter accent for gradients */
      --accent-glow:rgba(82,183,136,0.22);  /* ← glow effect */
      --text-dark:  #1b3a2d;      /* ← main heading color */
      --text-mid:   #3d6b56;      /* ← sub-text color */
      --text-muted: #718096;      /* ← placeholder / muted text */
      --border-col: #b7dfc9;      /* ← input borders */
      --input-bg:   rgba(255,255,255,0.85); /* ← input field background */
      --shadow:     0 32px 80px rgba(45,106,79,0.12), 0 8px 24px rgba(45,106,79,0.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      min-height:100vh;
      font-family:'Inter',sans-serif;
      background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }

    /* ── Subtle decorative blobs ── */
    .blob {
      position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;
    }
    .blob-1 {
      width:420px;height:420px;
      background:radial-gradient(circle, rgba(82,183,136,0.18) 0%, transparent 70%);
      top:-80px;left:-80px;
    }
    .blob-2 {
      width:380px;height:380px;
      background:radial-gradient(circle, rgba(45,106,79,0.12) 0%, transparent 70%);
      bottom:-60px;right:-60px;
    }
    .blob-3 {
      width:280px;height:280px;
      background:radial-gradient(circle, rgba(134,195,156,0.14) 0%, transparent 70%);
      top:50%;left:60%;
    }

    /* ── Decorative leaf pattern (top-right corner) ── */
    .deco-leaves {
      position:fixed;top:20px;right:20px;opacity:0.10;pointer-events:none;
    }

    /* ── Wrapper ── */
    .auth-wrapper {
      position:relative;z-index:10;
      width:100%;max-width:420px;margin:1.5rem;
    }

    /* ── Brand / Logo ── */
    .brand {
      text-align:center;margin-bottom:2rem;
    }
    .brand-icon {
      width:68px;height:68px;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      border-radius:20px;
      display:inline-flex;align-items:center;justify-content:center;
      margin-bottom:0.85rem;
      box-shadow:0 8px 28px var(--accent-glow), 0 2px 8px rgba(45,106,79,0.2);
    }
    .brand-icon svg{width:36px;height:36px;fill:#fff}
    .brand h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:2.1rem;font-weight:700;
      color:var(--text-dark);letter-spacing:0.3px;
      line-height:1.1;
    }
    .brand h1 span{color:var(--accent-lt)}
    .brand p {
      font-size:0.82rem;color:var(--text-mid);
      margin-top:0.3rem;font-weight:400;letter-spacing:0.2px;
    }

    /* ── Card ── */
    .card {
      background:var(--card-bg);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--card-border);
      border-radius:24px;
      padding:2.2rem 2.4rem;
      box-shadow:var(--shadow);
    }

    /* ── Tabs ── */
    .tab-bar {
      display:flex;background:#f0faf4;
      border:1px solid var(--border-col);
      border-radius:14px;padding:4px;margin-bottom:1.8rem;
    }
    .tab-btn {
      flex:1;padding:0.55rem;border:none;background:transparent;
      border-radius:10px;
      font-family:'Inter',sans-serif;font-size:0.87rem;font-weight:600;
      color:var(--text-mid);cursor:pointer;transition:all 0.25s;
    }
    .tab-btn.active {
      background:linear-gradient(135deg, var(--accent), var(--accent-lt));
      color:#fff;
      box-shadow:0 3px 14px var(--accent-glow);
    }
    .form-panel{display:none}
    .form-panel.active{display:block}

    /* ── Form fields ── */
    .form-group{margin-bottom:1.05rem}
    .form-group label {
      display:block;font-size:0.74rem;font-weight:600;
      color:var(--text-dark);margin-bottom:0.38rem;
      letter-spacing:0.35px;text-transform:uppercase;
    }
    .form-group input {
      width:100%;padding:0.72rem 1rem;
      border:1.5px solid var(--border-col);
      border-radius:11px;
      background:var(--input-bg);
      font-family:'Inter',sans-serif;font-size:0.93rem;
      color:var(--text-dark);outline:none;
      transition:border-color 0.22s,box-shadow 0.22s;
    }
    .form-group input::placeholder{color:var(--text-muted)}
    .form-group input:focus {
      border-color:var(--accent-lt);
      box-shadow:0 0 0 3.5px var(--accent-glow);
    }
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

    /* ── Button ── */
    .btn-primary {
      width:100%;padding:0.82rem;margin-top:0.5rem;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      color:#fff;font-family:'Inter',sans-serif;font-size:0.96rem;font-weight:600;
      border:none;border-radius:12px;cursor:pointer;
      letter-spacing:0.3px;
      transition:transform 0.15s,box-shadow 0.15s;
      box-shadow:0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 7px 28px var(--accent-glow)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary:disabled{opacity:0.65;cursor:not-allowed;transform:none}

    /* ── Alert ── */
    .alert{display:none;padding:0.75rem 1rem;border-radius:10px;font-size:0.85rem;margin-bottom:0.9rem}
    .alert.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}
    .alert.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}

    /* ── Spinner ── */
    .spinner{width:15px;height:15px;border:2.5px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Divider ── */
    .divider{display:flex;align-items:center;gap:0.7rem;margin:0.4rem 0 0.8rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border-col)}
    .divider span{font-size:0.73rem;color:var(--text-muted);font-weight:500}

    /* ── Footer ── */
    .footer-note{text-align:center;margin-top:1.1rem;font-size:0.79rem;color:var(--text-mid)}
    .footer-note a{color:var(--accent);font-weight:600;text-decoration:none}
    .footer-note a:hover{text-decoration:underline}
  </style>
</head>
<body>

<!-- Decorative blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Decorative leaves SVG -->
<svg class="deco-leaves" width="220" height="220" viewBox="0 0 220 220">
  <ellipse cx="120" cy="80" rx="55" ry="22" fill="#2d6a4f" transform="rotate(-35 120 80)"/>
  <ellipse cx="160" cy="130" rx="45" ry="18" fill="#52b788" transform="rotate(-60 160 130)"/>
  <ellipse cx="80" cy="160" rx="50" ry="20" fill="#2d6a4f" transform="rotate(-15 80 160)"/>
</svg>

<div class="auth-wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.5c-.66 1.1.54 2.3 1.6 1.6C8.31 19.03 14 15 18 9l-1-1zm1.67-3.77c-1.13.41-2.05 1.43-2.47 2.64-.13.36-.18.75-.2 1.13.6-.55 1.36-.97 2.19-1.21.6 0 1.11.4 1.3.95.4 1.2-.28 2.5-1.5 2.88-.35.08-.71.08-1 0-.1 1.35.32 2.72 1.23 3.72C18.73 15.1 20.6 15.5 22 15c0-4.96-1.84-8.5-3.33-10.77z"/></svg>
    </div>
    <h1>Farm<span>AI</span></h1>
    <p>Intelligent Crop Advisory System</p>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Login form -->
    <div class="form-panel active" id="panel-login">
      <div class="alert" id="login-alert"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In →</button>
      <div class="footer-note" style="margin-top:0.9rem">
        Don't have an account? <a href="#" onclick="switchTab('register');return false">Create one</a>
      </div>
    </div>

    <!-- Register form -->
    <div class="form-panel" id="panel-register">
      <div class="alert" id="reg-alert"></div>
      <div class="input-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="reg-fn" placeholder="FirstName"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="reg-ln" placeholder="LastName"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min. 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Create Account →</button>
      <div class="footer-note" style="margin-top:0.9rem">
        Already have an account? <a href="#" onclick="switchTab('login');return false">Sign in</a>
      </div>
    </div>
  </div>

<!--  <div class="footer-note" style="margin-top:1.2rem;color:var(&#45;&#45;text-muted)">-->
<!--    Powered by AI · Secured by MongoDB-->
<!--  </div>-->
<!--</div>-->

<script>
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  clearAlerts();
}
function clearAlerts(){
  ['login-alert','reg-alert'].forEach(id=>{
    const el=document.getElementById(id);
    el.className='alert';el.textContent='';
  });
}
function showAlert(id,msg,type){
  const el=document.getElementById(id);
  el.textContent=msg;el.className='alert '+type;
}
function csrf(){const v=document.cookie.match('(^|;) ?csrftoken=([^;]*)(;|$)');return v?v[2]:'';}
function setLoading(btnId,loading,label){
  const b=document.getElementById(btnId);
  b.disabled=loading;
  b.innerHTML=loading?`<span class="spinner"></span>Please wait…`:label;
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showAlert('login-alert','Please enter email and password.','error');return;}
  setLoading('btn-login',true,'Sign In →');
  try{
    const r=await fetch('/auth/login/',{
      method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
      body:JSON.stringify({email,password:pass})
    });
    const d=await r.json();
    if(d.success){window.location.href='/';}
    else{showAlert('login-alert',d.error||'Invalid credentials.','error');}
  }catch(e){showAlert('login-alert','Connection error. Please retry.','error');}
  finally{setLoading('btn-login',false,'Sign In →');}
}

async function doRegister(){
  const fn=document.getElementById('reg-fn').value.trim();
  const ln=document.getElementById('reg-ln').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!fn||!email||!pass){showAlert('reg-alert','Please fill all required fields.','error');return;}
  if(pass.length<6){showAlert('reg-alert','Password must be at least 6 characters.','error');return;}
  setLoading('btn-register',true,'Create Account →');
  try{
    const r=await fetch('/auth/register/',{
      method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
      body:JSON.stringify({first_name:fn,last_name:ln,email,password:pass})
    });
    const d=await r.json();
    if(d.success){window.location.href='/';}
    else{showAlert('reg-alert',d.error||'Registration failed.','error');}
  }catch(e){showAlert('reg-alert','Connection error. Please retry.','error');}
  finally{setLoading('btn-register',false,'Create Account →');}
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('panel-login').classList.contains('active'))doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
