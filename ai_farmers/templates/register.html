<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Farmer AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-card shadow-lg p-5">
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}<div class="alert alert-warning py-2 small text-center">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <h2 class="text-success fw-bold text-center">Register</h2>
        <form action="/register" method="POST">
            <input type="text" name="name" class="form-control custom-input" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control custom-input" placeholder="Email" required>
            <input type="password" name="password" class="form-control custom-input" placeholder="Password" required>
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold mt-2">🚀 Register</button>
        </form>
        <p class="mt-3 small text-center">Already have an account? <a href="/login" class="text-success">Login</a></p>
    </div>
</body>
</html>
