{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login - Farmer AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="glass-card shadow-lg p-5">

<h2 class="text-success fw-bold text-center mb-4">Login</h2>

<form method="POST">
{% csrf_token %}

<input
type="email"
name="email"
class="form-control custom-input"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control custom-input"
placeholder="Password"
required>

<button
type="submit"
class="btn btn-success w-100 py-2 fw-bold mt-3">

🔑 Login

</button>

</form>

<p class="mt-3 small text-center">

New user?

<a href="/register/" class="text-success fw-bold">
Create Account
</a>

</p>

</div>

</div>

</body>
</html>
