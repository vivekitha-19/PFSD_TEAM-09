{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer AI - Smart Advisory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-8 col-lg-6">

<div class="glass-card shadow-lg p-4">

<div class="d-flex justify-content-between mb-3 align-items-center">

<span id="badgeText" class="badge bg-success px-3 py-2">
Verified Rythu
</span>

<a href="/logout/" class="btn btn-sm btn-outline-danger">
Logout
</a>

</div>

<div class="text-center mb-4">

<h1 class="text-success fw-bold">🌾 Farmer AI</h1>

<p id="greet" class="text-muted small">
Welcome, {{ name|default:"Farmer" }}!
</p>

</div>

<form class="row g-3">

<div class="col-12">

<label id="lblLang" class="form-label">Preferred Language</label>

<select id="language" class="form-select custom-input" onchange="updateUI()">

<option value="en">English</option>
<option value="te">తెలుగు</option>
<option value="hi">हिन्दी</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label" id="lblCrop">Crop Name</label>

<select id="crop" class="form-select custom-input"></select>

</div>

<div class="col-md-6">

<label class="form-label" id="lblPart">Affected Part</label>

<select id="part" class="form-select custom-input"></select>

</div>

<div class="col-12">

<label class="form-label" id="lblDisease">Disease</label>

<select id="disease" class="form-select custom-input"></select>

</div>

<button type="button"
onclick="getAdvisory()"
id="btnAdvisory"
class="btn btn-success w-100 py-2 mt-3 fw-bold">

🔍 Get Advisory

</button>

</form>

<div id="resBox"
class="mt-4 p-3 border-start border-success border-4 bg-light rounded"
style="display:none;">

<h5 class="text-success border-bottom pb-2">
📋 Smart Advisory
</h5>

<div id="advisoryContent" class="mb-3"></div>

</div>

</div>

</div>

</div>

</div>

<!-- Chatbot Button -->

<div class="chat-toggle" onclick="toggleChat()">💬</div>

<!-- Chat Window -->

<div class="chat-window" id="chatWin" style="display:none;">

<div class="chat-header text-white p-3 d-flex justify-content-between">

<span>🌾 Rythu Assistant</span>

<span onclick="toggleChat()" style="cursor:pointer;">×</span>

</div>

<div id="chatBody" class="p-3">

<div class="text-muted small">
Ask me anything!
</div>

</div>

<div class="p-2 border-top d-flex">

<input type="text"
id="chatInput"
class="form-control me-2"
placeholder="Ask here...">

<button onclick="sendChat()" class="btn btn-success">
➤
</button>

</div>

</div>

<script>

const advisoryData = {

"Leaf Spot": {
en:"Apply Carbendazim spray.",
te:"కార్బెండజిమ్ స్ప్రే చేయండి.",
hi:"कार्बेन्डाजिम स्प्रे लगाएं।"
},

"Rust": {
en:"Use sulfur-based fungicides.",
te:"సల్ఫర్ ఆధారిత శిలీంధ్ర నాశినులను వాడండి.",
hi:"सल्फर आधारित कवकनाशी का प्रयोग करें।"
}

};

function updateUI(){

const lang=document.getElementById("language").value;

const t={

en:{
badge:"Verified Rythu",
crop:["Rice","Wheat"],
part:["Leaf","Stem"],
disease:["Leaf Spot","Rust"]
},

te:{
badge:"ధృవీకరించబడిన రైతు",
crop:["వరి","గోధుమ"],
part:["ఆకు","కాండం"],
disease:["ఆకు మచ్చ","రస్ట్"]
},

hi:{
badge:"सत्यापित किसान",
crop:["धान","गेहूं"],
part:["पत्ती","तना"],
disease:["पत्ती धब्बा","जंग"]
}

}[lang];

document.getElementById("badgeText").innerText=t.badge;

fillOptions("crop",t.crop);
fillOptions("part",t.part);
fillOptions("disease",t.disease);

}

function fillOptions(id,arr){

const s=document.getElementById(id);

s.innerHTML="";

arr.forEach(v=>{

let o=document.createElement("option");

o.value=v;
o.text=v;

s.appendChild(o);

});

}

function getAdvisory(){

const d=document.getElementById("disease").value;
const l=document.getElementById("language").value;

let key=d;

if(d==="ఆకు మచ్చ"||d==="पत्ती धब्बा") key="Leaf Spot";
if(d==="రస్ట్"||d==="जंग") key="Rust";

if(advisoryData[key]){

document.getElementById("resBox").style.display="block";
document.getElementById("advisoryContent").innerText=advisoryData[key][l];

}

}

function toggleChat(){

const win=document.getElementById("chatWin");

win.style.display=(win.style.display==="none")?"block":"none";

}

function sendChat(){

const input=document.getElementById("chatInput");
const body=document.getElementById("chatBody");
const lang=document.getElementById("language").value;
const msg=input.value.trim().toLowerCase();

if(!msg) return;

body.innerHTML+=`
<div class="text-end mb-2">
<span class="bg-success text-white p-2 rounded d-inline-block">
${input.value}
</span>
</div>`;

input.value="";

let reply="";

if(msg.includes("pest")||msg.includes("purugu")||msg.includes("keeda")){

if(lang==="te")
reply="పురుగుల నియంత్రణ కోసం వేప నూనె స్ప్రే చేయండి.";

else if(lang==="hi")
reply="कीट नियंत्रण के लिए नीम तेल का छिड़काव करें।";

else
reply="Use Neem Oil spray for pest control.";

}

else{

if(lang==="te")
reply="క్షమించండి, మీ ప్రశ్న అర్థం కాలేదు.";

else if(lang==="hi")
reply="क्षमा करें, आपका प्रश्न समझ में नहीं आया।";

else
reply="Sorry, I did not understand your question.";

}

setTimeout(()=>{

body.innerHTML+=`
<div class="text-start mb-2">
<span class="bg-light border p-2 rounded d-inline-block">
<b>Bot:</b> ${reply}
</span>
</div>`;

body.scrollTop=body.scrollHeight;

},500);

}

window.onload=updateUI;

</script>

</body>
</html>
